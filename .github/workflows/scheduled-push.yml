name: Scheduled Update

on:
  schedule:
    - cron: "30 3 * * *"    # 9:00 AM IST
    - cron: "30 6 * * *"    # 12:00 PM IST
    - cron: "30 9 * * *"    # 3:00 PM IST
    - cron: "30 12 * * *"   # 6:00 PM IST
    - cron: "30 13 * * *"   # 7:00 PM IST

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "456zamir8"
          git config user.email "zamirmolla77@gmail.com"

      - name: Make changes
        run: |
          echo "$(date)" >> heartbeat.txt

      - name: Commit changes
        run: |
          git add heartbeat.txt
          git commit -m "Scheduled update"

      - name: Push changes
        run: |
          git push
